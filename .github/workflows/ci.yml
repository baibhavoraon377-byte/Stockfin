name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pyflakes

      - name: Syntax check (ast.parse)
        run: |
          python -c "
          import ast, sys, pathlib
          files = list(pathlib.Path('.').rglob('*.py'))
          errors = []
          for f in files:
              try:
                  ast.parse(f.read_text())
                  print(f'  OK  {f}')
              except SyntaxError as e:
                  errors.append(f'  FAIL {f}: {e}')
          if errors:
              print('\n'.join(errors)); sys.exit(1)
          print(f'\nAll {len(files)} files passed syntax check.')
          "

      - name: Lint with flake8
        run: |
          # Stop on syntax errors; warn on style (E501 = long lines, W503 = line break)
          flake8 . \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics
          flake8 . \
            --count \
            --max-line-length=120 \
            --ignore=E501,W503,W504,E302,E303 \
            --statistics || true

      - name: Import check
        run: |
          python -c "import utils.indicators; print('utils.indicators OK')"
          python -c "import utils.stock_data;  print('utils.stock_data  OK')"
